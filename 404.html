<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>404 - Page Not Found | Lenny Kimanthi</title>
   <link rel="icon" type="image/png" href="assets/img/favicon.png">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
   <style>
      :root {
         --hue: 180;
         --first-color: hsl(var(--hue), 80%, 48%);
         --first-color-alt: hsl(var(--hue), 80%, 44%);
         --white-color: hsl(var(--hue), 8%, 92%);
         --black-color: hsl(var(--hue), 4%, 8%);
         --body-color: hsl(var(--hue), 8%, 8%);
         --container-color: hsl(var(--hue), 8%, 12%);
         --body-font: "Unbounded", sans-serif;
      }

      * {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }

      body {
         font-family: var(--body-font);
         background-color: var(--body-color);
         color: var(--white-color);
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         text-align: center;
         padding: 1rem;
      }

      .error-container {
         max-width: 600px;
         width: 100%;
      }

      .error-code {
         font-size: clamp(4rem, 15vw, 12rem);
         font-weight: 600;
         color: var(--first-color);
         line-height: 1;
         margin-bottom: 1rem;
         text-shadow: 0 0 30px hsla(var(--hue), 80%, 48%, 0.3);
      }

      .error-title {
         font-size: clamp(1.5rem, 4vw, 2.5rem);
         margin-bottom: 1rem;
         color: var(--white-color);
      }

      .error-description {
         font-size: 1.1rem;
         margin-bottom: 2rem;
         opacity: 0.8;
         line-height: 1.6;
      }

      .error-buttons {
         display: flex;
         gap: 1rem;
         justify-content: center;
         flex-wrap: wrap;
      }

      .button {
         display: inline-flex;
         align-items: center;
         gap: 0.5rem;
         background-color: var(--first-color);
         color: var(--black-color);
         padding: 1rem 1.5rem;
         border-radius: 0.5rem;
         text-decoration: none;
         font-weight: 600;
         transition: all 0.3s ease;
         border: 2px solid var(--first-color);
      }

      .button:hover {
         background-color: var(--first-color-alt);
         transform: translateY(-2px);
      }

      .button:focus-visible {
         outline: 2px solid var(--first-color);
         outline-offset: 4px;
      }

      .button--secondary {
         background-color: transparent;
         color: var(--first-color);
         border: 2px solid var(--first-color);
      }

      .button--secondary:hover {
         background-color: var(--first-color);
         color: var(--black-color);
      }

      .error-animation {
         animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
         0%, 100% { transform: translateY(0px); }
         50% { transform: translateY(-10px); }
      }

      @media (max-width: 480px) {
         .error-buttons {
            flex-direction: column;
            align-items: center;
         }
         
         .button {
            width: 100%;
            max-width: 250px;
            justify-content: center;
         }
      }
   </style>
</head>
<body>
   <div class="error-container">
      <div class="error-code error-animation">404</div>
      <h1 class="error-title">Oops! Page Not Found</h1>
      <p class="error-description">
         The page you're looking for seems to have wandered off into the digital void. 
         Don't worry, even the best developers get lost sometimes!
      </p>
      <div class="error-buttons">
         <a href="/" class="button">
            <i class="ri-home-line"></i>
            Go Home
         </a>
         <a href="/#projects" class="button button--secondary">
            <i class="ri-briefcase-line"></i>
            View Projects
         </a>
      </div>
   </div>
</body>
</html>
